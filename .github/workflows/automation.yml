name: Automation Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  web-test:
    name: Run Web Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ Fix Node.js warning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install Google Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Run Web Test
        run: ./gradlew webTest
        continue-on-error: true

      - name: Upload Web Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-reports
          path: build/cucumber-reports/
          retention-days: 30
          if-no-files-found: warn

  api-test:
    name: Run API Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ Fix Node.js warning

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Run API Test
        run: ./gradlew apiTest
        continue-on-error: true

      - name: Upload API Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: build/cucumber-reports/
          retention-days: 30
          if-no-files-found: warn
