name: Automation Test

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Google Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: Grant permission
        run: chmod +x gradlew

      # 🔥 Buat folder report dulu
      - name: Create report directory
        run: mkdir -p build/cucumber-reports

      # 🔥 Run Web Test (jangan hentikan workflow kalau gagal)
      - name: Run Web Test
        run: ./gradlew webTest
        continue-on-error: true

      # 🔥 Run API Test
      - name: Run API Test
        run: ./gradlew apiTest
        continue-on-error: true

      # 🔥 Upload Cucumber Reports
      - name: Upload Cucumber Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: build/cucumber-reports/

      # 🔥 Generate Allure Report
      - name: Generate Allure Report
        if: always()
        run: |
          sudo apt update
          sudo apt install -y allure
          allure generate build/allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
